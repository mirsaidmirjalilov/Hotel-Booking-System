<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HotelBooking - Find Your Stay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {primary: '#3b82f6'}
                }
            }
        }
    </script>
    <style>
        body {
            background: #f3f4f6;
        }

        .card-hover {
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="font-sans antialiased">

<!-- Header with Profile Dropdown -->
<nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center">
                <i class="fas fa-hotel text-primary text-2xl mr-2"></i>
                <span class="font-bold text-xl text-gray-800">HotelBooking</span>
            </div>
            <div class="relative">
                <button id="profileBtn"
                        class="flex items-center space-x-2 focus:outline-none bg-gray-100 hover:bg-gray-200 rounded-full px-3 py-2 transition">
                    <i class="fas fa-user-circle text-2xl text-gray-600"></i>
                    <span id="userNameDisplay"
                          class="text-sm font-medium text-gray-700 hidden sm:inline">Loading...</span>
                    <i class="fas fa-chevron-down text-xs text-gray-500"></i>
                </button>
                <div id="dropdownMenu"
                     class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-1 z-50 border">
                    <a href="#" id="profileLink" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                        <i class="fas fa-user mr-2"></i> My Profile
                    </a>
                    <hr class="my-1">
                    <button id="logoutBtn"
                            class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-100">
                        <i class="fas fa-sign-out-alt mr-2"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Search Section -->
    <div class="bg-white rounded-2xl shadow-md p-6 mb-10">
        <h2 class="text-2xl font-bold text-gray-800 mb-4">Find your perfect hotel</h2>
        <form id="searchForm" class="grid md:grid-cols-4 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
                <div class="relative">
                    <i class="fas fa-map-marker-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="city" placeholder="Enter city name"
                           class="pl-10 w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-primary focus:border-primary">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Check-in</label>
                <input type="date" id="checkIn" class="w-full border border-gray-300 rounded-lg px-4 py-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Check-out</label>
                <input type="date" id="checkOut" class="w-full border border-gray-300 rounded-lg px-4 py-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Guests</label>
                <input type="number" id="guests" min="1" value="2"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2">
            </div>
            <div class="md:col-span-4">
                <button type="submit"
                        class="bg-primary hover:bg-primary/90 text-white font-semibold py-2 px-6 rounded-lg transition w-full md:w-auto">
                    <i class="fas fa-search mr-2"></i> Search Hotels
                </button>
            </div>
        </form>
    </div>

    <!-- Hotels Grid -->
    <div>
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold text-gray-800">Available Hotels</h2>
            <span id="hotelCount" class="text-sm text-gray-500">0 properties found</span>
        </div>
        <div id="hotelsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-10 text-gray-500">Loading hotels...</div>
        </div>
        <!-- Pagination (simple) -->
        <div id="pagination" class="flex justify-center mt-8 gap-2 hidden"></div>
    </div>
</main>

<!-- Room Selection Modal -->
<div id="roomModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden transition-all">
    <div class="bg-white rounded-2xl max-w-2xl w-full mx-4 p-6 shadow-xl max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold">Select a Room</h3>
            <button id="closeRoomModalBtn" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i>
            </button>
        </div>
        <div id="roomList" class="space-y-3">
            <!-- Rooms will be listed here -->
        </div>
    </div>
</div>

<!-- Booking Confirmation Modal -->
<div id="bookingModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden transition-all">
    <div class="bg-white rounded-2xl max-w-md w-full mx-4 p-6 shadow-xl">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold">Confirm Booking</h3>
            <button id="closeConfirmModalBtn" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i>
            </button>
        </div>
        <div id="bookingDetails" class="mb-4 space-y-2">
            <!-- Dynamic booking summary -->
        </div>
        <button id="confirmBookingBtn"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition">
            Confirm Booking
        </button>
    </div>
</div>

<script>
    // ---------- Authentication ----------
    const token = localStorage.getItem('authToken');
    const user = JSON.parse(localStorage.getItem('user') || '{}');

    if (!token || !user.email) {
        window.location.href = 'login.html';
    }

    document.getElementById('userNameDisplay').textContent = user.fullName ? user.fullName.split(' ')[0] : user.email.split('@')[0];

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('authToken');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    });

    // Profile dropdown
    const profileBtn = document.getElementById('profileBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');
    profileBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdownMenu.classList.toggle('hidden');
    });
    document.addEventListener('click', () => dropdownMenu.classList.add('hidden'));
    document.getElementById('profileLink').addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = 'profile.html';
    });

    // ---------- State ----------
    let currentPage = 0;
    let currentCity = '';
    let currentCheckIn = '';
    let currentCheckOut = '';
    let currentGuests = 2;
    let currentTotalPages = 0;
    let selectedHotel = null;
    let selectedRoom = null;
    let selectedHotelName = '';

    // Helper fetch with auth
    async function authFetch(url, options = {}) {
        const defaultOptions = {
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        };
        const response = await fetch(url, {...defaultOptions, ...options});
        if (response.status === 401 || response.status === 403) {
            localStorage.removeItem('authToken');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
            throw new Error('Unauthorized');
        }
        return response;
    }

    // Load hotels from API (GET /api/v1/hotels or /api/v1/hotels/search?city=...)
    async function loadHotels(city = '', page = 0) {
        let url = `/api/v1/hotels?page=${page}&size=9`;
        if (city.trim()) {
            url = `/api/v1/hotels/search?city=${encodeURIComponent(city)}&page=${page}&size=9`;
        }
        try {
            const response = await authFetch(url);
            const data = await response.json();
            const pageData = data.data; // BaseResponse<Page<HotelResponse>>
            const hotels = pageData.content || [];
            currentTotalPages = pageData.totalPages || 0;
            renderHotels(hotels);
            document.getElementById('hotelCount').innerText = `${pageData.totalElements || 0} properties found`;
            renderPagination();
            return hotels;
        } catch (error) {
            console.error('Load hotels error:', error);
            return [];
        }
    }

    function renderPagination() {
        const container = document.getElementById('pagination');
        if (currentTotalPages <= 1) {
            container.classList.add('hidden');
            return;
        }
        container.classList.remove('hidden');
        let paginationHtml = '';
        for (let i = 0; i < currentTotalPages; i++) {
            paginationHtml += `<button data-page="${i}" class="px-3 py-1 rounded ${i === currentPage ? 'bg-primary text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">${i + 1}</button>`;
        }
        container.innerHTML = paginationHtml;
        document.querySelectorAll('#pagination button').forEach(btn => {
            btn.addEventListener('click', async () => {
                currentPage = parseInt(btn.dataset.page);
                await loadHotels(currentCity, currentPage);
            });
        });
    }

    function renderHotels(hotels) {
        const container = document.getElementById('hotelsContainer');
        if (!hotels.length) {
            container.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500">No hotels found. Try a different city.</div>`;
            return;
        }
        container.innerHTML = hotels.map(hotel => `
                <div class="bg-white rounded-xl overflow-hidden shadow-md card-hover">
                    <div class="w-full h-48 bg-gray-200 flex items-center justify-center">
                        <i class="fas fa-hotel text-5xl text-gray-400"></i>
                    </div>
                    <div class="p-4">
                        <h3 class="text-lg font-bold text-gray-800">${escapeHtml(hotel.hotelName)}</h3>
                        <p class="text-gray-500 text-sm mt-1"><i class="fas fa-map-marker-alt mr-1"></i>${escapeHtml(hotel.city)}</p>
                        <p class="text-gray-600 text-sm mt-2 line-clamp-2">${escapeHtml(hotel.description || 'No description available')}</p>
                        <div class="mt-3">
                            <button data-id="${hotel.id}" data-name="${escapeHtml(hotel.hotelName)}" class="viewRoomsBtn w-full bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                                View Rooms
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

        document.querySelectorAll('.viewRoomsBtn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const hotelId = parseInt(btn.dataset.id);
                const hotelName = btn.dataset.name;
                selectedHotel = {id: hotelId, name: hotelName};
                await showRoomSelection(hotelId);
            });
        });
    }

    // Show room selection modal
    async function showRoomSelection(hotelId) {
        if (!currentCheckIn || !currentCheckOut) {
            alert('Please select check-in and check-out dates first.');
            return;
        }
        try {
            const response = await authFetch(`/api/v1/hotels/${hotelId}/rooms`);
            const data = await response.json();
            const rooms = data.data || [];
            if (rooms.length === 0) {
                alert('No rooms available for this hotel.');
                return;
            }
            const roomListDiv = document.getElementById('roomList');
            roomListDiv.innerHTML = rooms.map(room => `
                    <div class="border rounded-lg p-4 hover:shadow-md transition cursor-pointer room-option" data-room='${JSON.stringify(room)}'>
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-bold">${escapeHtml(room.roomType || 'Standard Room')}</h4>
                                <p class="text-sm text-gray-600">Capacity: ${room.capacity || 2} guests</p>
                                <p class="text-sm text-gray-600">${room.description || ''}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-primary font-bold">$${room.pricePerNight || 0} <span class="text-gray-500 text-sm">/ night</span></p>
                            </div>
                        </div>
                    </div>
                `).join('');
            document.getElementById('roomModal').classList.remove('hidden');
            // Attach click event to each room option
            document.querySelectorAll('.room-option').forEach(el => {
                el.addEventListener('click', () => {
                    const room = JSON.parse(el.dataset.room);
                    selectedRoom = room;
                    document.getElementById('roomModal').classList.add('hidden');
                    showBookingConfirmation();
                });
            });
        } catch (error) {
            alert('Could not load rooms. Please try again.');
            console.error(error);
        }
    }

    // Show booking confirmation modal with price calculation
    function showBookingConfirmation() {
        const nights = Math.ceil((new Date(currentCheckOut) - new Date(currentCheckIn)) / (1000 * 60 * 60 * 24));
        const total = selectedRoom.pricePerNight * nights;
        const bookingDetailsDiv = document.getElementById('bookingDetails');
        bookingDetailsDiv.innerHTML = `
                <p><strong>Hotel:</strong> ${escapeHtml(selectedHotel.name)}</p>
                <p><strong>Room:</strong> ${escapeHtml(selectedRoom.roomType || 'Standard')} (${selectedRoom.capacity || 2} guests)</p>
                <p><strong>Check-in:</strong> ${currentCheckIn}</p>
                <p><strong>Check-out:</strong> ${currentCheckOut}</p>
                <p><strong>Nights:</strong> ${nights}</p>
                <p><strong>Guests:</strong> ${currentGuests}</p>
                <p class="text-lg font-bold text-primary mt-2">Total: $${total}</p>
            `;
        const modal = document.getElementById('bookingModal');
        modal.dataset.nights = nights;
        modal.dataset.total = total;
        modal.classList.remove('hidden');
    }

    // Confirm booking (POST /api/v1/bookings)
    async function confirmBooking() {
        const bookingRequest = {
            hotelId: selectedHotel.id,
            roomId: selectedRoom.id,
            checkIn: currentCheckIn,
            checkOut: currentCheckOut,
            guests: currentGuests,
            totalPrice: parseFloat(document.getElementById('bookingModal').dataset.total)
        };
        try {
            // Replace with your actual booking endpoint
            const response = await authFetch('/api/v1/bookings', {
                method: 'POST',
                body: JSON.stringify(bookingRequest)
            });
            if (response.ok) {
                alert('✅ Booking confirmed!');
                document.getElementById('bookingModal').classList.add('hidden');
                // Optionally refresh hotels (not needed)
            } else {
                const error = await response.json();
                alert(`Booking failed: ${error.message || 'Unknown error'}`);
            }
        } catch (error) {
            alert('Booking failed. Please try again.');
            console.error(error);
        }
    }

    // Search handler
    document.getElementById('searchForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        currentCity = document.getElementById('city').value.trim();
        currentCheckIn = document.getElementById('checkIn').value;
        currentCheckOut = document.getElementById('checkOut').value;
        currentGuests = parseInt(document.getElementById('guests').value);

        if (currentCheckIn && currentCheckOut && new Date(currentCheckIn) >= new Date(currentCheckOut)) {
            alert('Check-out date must be after check-in date.');
            return;
        }
        currentPage = 0;
        await loadHotels(currentCity, currentPage);
    });

    // Modal close buttons
    document.getElementById('closeRoomModalBtn').addEventListener('click', () => {
        document.getElementById('roomModal').classList.add('hidden');
    });
    document.getElementById('closeConfirmModalBtn').addEventListener('click', () => {
        document.getElementById('bookingModal').classList.add('hidden');
    });
    document.getElementById('confirmBookingBtn').addEventListener('click', confirmBooking);
    document.getElementById('bookingModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('bookingModal')) {
            document.getElementById('bookingModal').classList.add('hidden');
        }
    });
    document.getElementById('roomModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('roomModal')) {
            document.getElementById('roomModal').classList.add('hidden');
        }
    });

    // Helper to escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function (m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Initial load: set default dates and load all hotels
    window.addEventListener('load', async () => {
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const dayAfter = new Date();
        dayAfter.setDate(dayAfter.getDate() + 2);
        document.getElementById('checkIn').value = tomorrow.toISOString().split('T')[0];
        document.getElementById('checkOut').value = dayAfter.toISOString().split('T')[0];
        currentCheckIn = document.getElementById('checkIn').value;
        currentCheckOut = document.getElementById('checkOut').value;
        currentGuests = 2;
        await loadHotels('', 0);
    });
</script>
</body>
</html>
