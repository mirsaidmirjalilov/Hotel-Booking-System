<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Profile | HotelBooking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {primary: '#3b82f6'}
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen py-8 px-4">

<div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <a href="index.html"
           class="bg-white/20 backdrop-blur-sm hover:bg-white/30 text-white px-4 py-2 rounded-lg transition flex items-center gap-2">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
        <button id="logoutBtn"
                class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition flex items-center gap-2">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>

    <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-primary/10 px-6 py-4 border-b">
            <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                <i class="fas fa-user-circle text-primary"></i> My Profile
            </h1>
            <p class="text-gray-600 text-sm">View and manage your personal information</p>
        </div>

        <div class="p-6">
            <div class="flex justify-center mb-6">
                <div class="h-24 w-24 bg-primary/20 rounded-full flex items-center justify-center">
                    <i class="fas fa-user text-4xl text-primary"></i>
                </div>
            </div>

            <form id="profileForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name *</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input type="text" id="fullName" name="fullName" required
                               class="pl-10 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition">
                    </div>
                    <p class="error-message text-red-500 text-xs mt-1 hidden" data-for="fullName"></p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400"></i>
                        </div>
                        <input type="email" id="email" readonly
                               class="pl-10 w-full px-4 py-2 border border-gray-200 rounded-lg bg-gray-50 text-gray-500">
                    </div>
                    <p class="text-xs text-gray-400 mt-1">Email cannot be changed</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number *</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-phone-alt text-gray-400"></i>
                        </div>
                        <input type="tel" id="phoneNumber" name="phoneNumber" required
                               class="pl-10 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition"
                               placeholder="+998 90 123 45 67">
                    </div>
                    <p class="text-xs text-gray-500 mt-1">Format: +998 9X XXX XX XX (Uzbekistan)</p>
                    <p class="error-message text-red-500 text-xs mt-1 hidden" data-for="phoneNumber"></p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-tag text-gray-400"></i>
                        </div>
                        <input type="text" id="role" readonly
                               class="pl-10 w-full px-4 py-2 border border-gray-200 rounded-lg bg-gray-50 text-gray-500">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Member Since</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-calendar-alt text-gray-400"></i>
                        </div>
                        <input type="text" id="memberSince" readonly
                               class="pl-10 w-full px-4 py-2 border border-gray-200 rounded-lg bg-gray-50 text-gray-500">
                    </div>
                </div>

                <div>
                    <button type="submit" id="updateProfileBtn"
                            class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-2 px-4 rounded-lg transition flex items-center justify-center gap-2">
                        <i class="fas fa-save"></i> Update Profile
                    </button>
                    <div id="profileMessage" class="mt-3 text-sm text-center hidden rounded-lg p-2"></div>
                </div>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-200">
                <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-lock text-primary"></i> Change Password
                </h2>
                <form id="passwordForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-key text-gray-400"></i>
                            </div>
                            <input type="password" id="currentPassword" required
                                   class="pl-10 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                        <input type="password" id="newPassword" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
                        <input type="password" id="confirmPassword" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition">
                    </div>
                    <div>
                        <button type="submit" id="changePasswordBtn"
                                class="w-full bg-gray-700 hover:bg-gray-800 text-white font-semibold py-2 px-4 rounded-lg transition flex items-center justify-center gap-2">
                            <i class="fas fa-exchange-alt"></i> Change Password
                        </button>
                        <div id="passwordMessage" class="mt-3 text-sm text-center hidden rounded-lg p-2"></div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('authToken');
    let user = JSON.parse(localStorage.getItem('user') || '{}');

    if (!token) {
        window.location.href = 'login.html';
    }

    // Updated authFetch – does NOT redirect on 401
    async function authFetch(url, options = {}) {
        const defaultOptions = {
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        };
        const response = await fetch(url, { ...defaultOptions, ...options });
        if (response.status === 401 || response.status === 403) {
            throw new Error('Session expired – please logout and login again');
        }
        return response;
    }

    function showMessage(elementId, message, isError = false) {
        const el = document.getElementById(elementId);
        el.textContent = message;
        el.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
        if (isError) {
            el.classList.add('bg-red-100', 'text-red-800');
        } else {
            el.classList.add('bg-green-100', 'text-green-800');
        }
        setTimeout(() => el.classList.add('hidden'), 4000);
    }

    function clearFieldErrors() {
        document.querySelectorAll('.error-message').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('input').forEach(field => field.classList.remove('border-red-500'));
    }

    function showFieldError(fieldId, message) {
        const errorEl = document.querySelector(`.error-message[data-for="${fieldId}"]`);
        const inputEl = document.getElementById(fieldId);
        if (errorEl) {
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');
        }
        if (inputEl) inputEl.classList.add('border-red-500');
    }

    function validatePhone(phone) {
        const phoneRegex = /^\+998(9[01345789])\d{7}$/;
        const cleaned = phone.replace(/[\s-]/g, '');
        return phoneRegex.test(cleaned);
    }

    // Updated loadUserProfile with proper error handling
    async function loadUserProfile() {
        try {
            const response = await authFetch('/api/v1/users/profile');
            const data = await response.json();
            const userData = data.data;
            if (userData) {
                document.getElementById('fullName').value = userData.fullName || '';
                document.getElementById('email').value = userData.email || '';
                document.getElementById('phoneNumber').value = userData.phoneNumber || '';
                const roleText = userData.role ? userData.role.charAt(0) + userData.role.slice(1).toLowerCase() : '';
                document.getElementById('role').value = roleText;
                if (userData.createdAt) {
                    const date = new Date(userData.createdAt);
                    document.getElementById('memberSince').value = date.toLocaleDateString();
                }
                const updatedUser = { ...user, ...userData };
                localStorage.setItem('user', JSON.stringify(updatedUser));
                user = updatedUser;
            }
        } catch (error) {
            console.error('Profile load error:', error);
            showMessage('profileMessage', 'Authentication failed. Please logout and login again.', true);
            // Show a manual logout button or link
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) logoutBtn.classList.add('animate-pulse', 'bg-red-700');
        }
    }

    async function updateProfile(e) {
        e.preventDefault();
        clearFieldErrors();
        const fullName = document.getElementById('fullName').value.trim();
        let phoneNumber = document.getElementById('phoneNumber').value.trim();

        let isValid = true;
        if (!fullName) {
            showFieldError('fullName', 'Full name is required');
            isValid = false;
        } else if (fullName.length < 2) {
            showFieldError('fullName', 'Name must be at least 2 characters');
            isValid = false;
        }
        if (!phoneNumber) {
            showFieldError('phoneNumber', 'Phone number is required');
            isValid = false;
        } else if (!validatePhone(phoneNumber)) {
            showFieldError('phoneNumber', 'Invalid format. Use +998 90 123 45 67');
            isValid = false;
        }
        if (!isValid) return;

        phoneNumber = phoneNumber.replace(/[\s-]/g, '');
        const updateData = {fullName, phoneNumber};

        try {
            const response = await authFetch('/api/v1/users/profile', {
                method: 'PUT',
                body: JSON.stringify(updateData)
            });
            if (response.status === 204 || response.ok) {
                showMessage('profileMessage', 'Profile updated successfully!', false);
                await loadUserProfile();
            } else {
                const err = await response.json().catch(() => ({}));
                showMessage('profileMessage', err.message || 'Update failed', true);
            }
        } catch (error) {
            showMessage('profileMessage', 'Network error. Please try again.', true);
        }
    }

    async function changePassword(e) {
        e.preventDefault();
        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!currentPassword || !newPassword || !confirmPassword) {
            showMessage('passwordMessage', 'All password fields are required', true);
            return;
        }
        if (newPassword.length < 6) {
            showMessage('passwordMessage', 'New password must be at least 6 characters', true);
            return;
        }
        if (newPassword !== confirmPassword) {
            showMessage('passwordMessage', 'New passwords do not match', true);
            return;
        }

        const passwordData = {currentPassword, newPassword};

        try {
            const response = await authFetch('/api/v1/users/profile/password', {
                method: 'PUT',
                body: JSON.stringify(passwordData)
            });
            if (response.status === 204 || response.ok) {
                showMessage('passwordMessage', 'Password changed successfully!', false);
                document.getElementById('passwordForm').reset();
            } else {
                const err = await response.json().catch(() => ({}));
                showMessage('passwordMessage', err.message || 'Password change failed', true);
            }
        } catch (error) {
            showMessage('passwordMessage', 'Network error. Please try again.', true);
        }
    }

    function logout() {
        localStorage.removeItem('authToken');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    }

    document.getElementById('profileForm').addEventListener('submit', updateProfile);
    document.getElementById('passwordForm').addEventListener('submit', changePassword);
    document.getElementById('logoutBtn').addEventListener('click', logout);

    loadUserProfile();
</script>
</body>
</html>
