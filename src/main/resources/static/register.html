<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Create Account | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#3b82f6', secondary: '#10b981' }
                }
            }
        }
    </script>
    <style>
        input[type="tel"]::-webkit-inner-spin-button,
        input[type="tel"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .transition-smooth { transition: all 0.2s ease-in-out; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="font-sans antialiased">
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white/90 backdrop-blur-sm rounded-2xl shadow-2xl p-8">
        <div class="text-center">
            <div class="mx-auto h-16 w-16 bg-primary/10 rounded-full flex items-center justify-center">
                <i class="fas fa-user-plus text-3xl text-primary"></i>
            </div>
            <h2 class="mt-4 text-3xl font-extrabold text-gray-800">Create account</h2>
            <p class="mt-2 text-sm text-gray-600">Join us to get started</p>
        </div>

        <form id="registerForm" class="mt-8 space-y-5">
            <div>
                <label for="fullName" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-user text-gray-400 text-sm"></i>
                    </div>
                    <input type="text" id="fullName" name="fullName" required
                           class="pl-10 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-smooth"
                           placeholder="John Doe">
                </div>
                <p class="error-message text-red-500 text-xs mt-1 hidden" data-for="fullName"></p>
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-gray-400 text-sm"></i>
                    </div>
                    <input type="email" id="email" name="email" required
                           class="pl-10 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-smooth"
                           placeholder="you@example.com">
                </div>
                <p class="error-message text-red-500 text-xs mt-1 hidden" data-for="email"></p>
            </div>

            <div>
                <label for="phoneNumber" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-phone-alt text-gray-400 text-sm"></i>
                    </div>
                    <input type="tel" id="phoneNumber" name="phoneNumber" required
                           class="pl-10 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-smooth"
                           placeholder="+998 90 123 45 67">
                </div>
                <p class="text-xs text-gray-500 mt-1">Format: +998 9X XXX XX XX (Uzbekistan)</p>
                <p class="error-message text-red-500 text-xs mt-1 hidden" data-for="phoneNumber"></p>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-gray-400 text-sm"></i>
                    </div>
                    <input type="password" id="password" name="password" required
                           class="pl-10 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-smooth"
                           placeholder="••••••••">
                    <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center">
                        <i class="fas fa-eye-slash text-gray-400 hover:text-gray-600"></i>
                    </button>
                </div>
                <p class="error-message text-red-500 text-xs mt-1 hidden" data-for="password"></p>
            </div>

            <div>
                <label for="role" class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-tag text-gray-400 text-sm"></i>
                    </div>
                    <select id="role" name="role"
                            class="pl-10 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary bg-white appearance-none transition-smooth">
                        <option value="CUSTOMER">Customer (default)</option>
                        <option value="ADMIN">Administrator</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                        <i class="fas fa-chevron-down text-gray-400"></i>
                    </div>
                </div>
                <p class="text-xs text-gray-500 mt-1">Select your account type</p>
            </div>

            <div>
                <button type="submit" id="submitBtn"
                        class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-xl text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200 transform hover:scale-[1.01]">
                        <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                            <i class="fas fa-user-plus group-hover:scale-110 transition-transform"></i>
                        </span>
                    Create Account
                </button>
                <div id="loadingSpinner" class="hidden mt-3 text-center">
                    <i class="fas fa-circle-notch fa-spin text-primary text-xl"></i>
                    <span class="ml-2 text-gray-600">Processing...</span>
                </div>
            </div>

            <div id="apiMessage" class="rounded-lg p-3 text-sm hidden transition-all"></div>

            <div class="text-center mt-4">
                <p class="text-sm text-gray-600">
                    Already have an account?
                    <a href="login.html" class="font-medium text-primary hover:text-primary/80 transition">Sign in</a>
                </p>
            </div>
        </form>
    </div>
</div>

<script>
    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const apiMessageDiv = document.getElementById('apiMessage');
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    function showMessage(message, isError = false) {
        apiMessageDiv.textContent = message;
        apiMessageDiv.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
        if (isError) {
            apiMessageDiv.classList.add('bg-red-100', 'text-red-800', 'border', 'border-red-200');
        } else {
            apiMessageDiv.classList.add('bg-green-100', 'text-green-800', 'border', 'border-green-200');
        }
        apiMessageDiv.classList.remove('hidden');
        if (!isError) {
            setTimeout(() => apiMessageDiv.classList.add('hidden'), 5000);
        }
    }

    function clearFieldErrors() {
        document.querySelectorAll('.error-message').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('input, select').forEach(field => {
            field.classList.remove('border-red-500', 'ring-red-200');
            field.classList.add('border-gray-300');
        });
    }

    function showFieldError(fieldId, message) {
        const errorEl = document.querySelector(`.error-message[data-for="${fieldId}"]`);
        const inputEl = document.getElementById(fieldId);
        if (errorEl) {
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');
        }
        if (inputEl) {
            inputEl.classList.remove('border-gray-300');
            inputEl.classList.add('border-red-500');
        }
    }

    function validatePhone(phone) {
        const phoneRegex = /^\+998(9[01345789])\d{7}$/;
        const cleaned = phone.replace(/[\s-]/g, '');
        return phoneRegex.test(cleaned);
    }

    function formatPhoneInput(e) {
        let value = e.target.value.replace(/[^\d+]/g, '');
        if (!value.startsWith('+')) {
            if (value.startsWith('998')) value = '+' + value;
            else if (value.length > 0 && !value.startsWith('+')) value = '+' + value;
        }
        e.target.value = value;
    }
    const phoneField = document.getElementById('phoneNumber');
    phoneField.addEventListener('input', formatPhoneInput);

    togglePassword.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        togglePassword.querySelector('i').classList.toggle('fa-eye');
        togglePassword.querySelector('i').classList.toggle('fa-eye-slash');
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearFieldErrors();

        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        let phoneNumber = document.getElementById('phoneNumber').value.trim();
        const password = document.getElementById('password').value;
        const role = document.getElementById('role').value;

        let isValid = true;

        if (!fullName) {
            showFieldError('fullName', 'Full name is required');
            isValid = false;
        } else if (fullName.length < 2) {
            showFieldError('fullName', 'Name must be at least 2 characters');
            isValid = false;
        }

        const emailRegex = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
        if (!email) {
            showFieldError('email', 'Email address is required');
            isValid = false;
        } else if (!emailRegex.test(email)) {
            showFieldError('email', 'Please enter a valid email address');
            isValid = false;
        }

        if (!password) {
            showFieldError('password', 'Password is required');
            isValid = false;
        } else if (password.length < 6) {
            showFieldError('password', 'Password must be at least 6 characters');
            isValid = false;
        }

        if (!phoneNumber) {
            showFieldError('phoneNumber', 'Phone number is required');
            isValid = false;
        } else if (!validatePhone(phoneNumber)) {
            showFieldError('phoneNumber', 'Phone must be in format +9989XXXXXXXX (Uzbekistan)');
            isValid = false;
        }

        if (!isValid) return;

        const requestBody = {
            fullName: fullName,
            email: email,
            phoneNumber: phoneNumber.replace(/[\s-]/g, ''),
            password: password,
            role: role
        };

        submitBtn.disabled = true;
        submitBtn.classList.add('opacity-60', 'cursor-not-allowed');
        loadingSpinner.classList.remove('hidden');
        apiMessageDiv.classList.add('hidden');

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();

            if (response.ok) {
                // Registration success (no token returned)
                showMessage('✅ Registration successful! Redirecting to login...', false);
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                const errorMsg = data.message || data.error || 'Registration failed. Please check your details.';
                showMessage(`❌ ${errorMsg}`, true);
            }
        } catch (error) {
            console.error('Network error:', error);
            showMessage('⚠️ Network error. Could not connect to server.', true);
        } finally {
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-60', 'cursor-not-allowed');
            loadingSpinner.classList.add('hidden');
        }
    });
</script>
</body>
</html>
