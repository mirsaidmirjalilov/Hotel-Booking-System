databaseChangeLog:
  - changeSet:
      id: 005-create-reviews-table
      author: mirsaid
      changes:
        - createTable:
            tableName: reviews
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: rating
                  type: int
                  constraints:
                    nullable: false

              - column:
                  name: comment
                  type: text
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false

              - column:
                  name: hotel_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_review_hotel
                    references: hotels(id)

              - column:
                  name: booking_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_review_booking
                    references: bookings(id)

              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false

              - column:
                  name: created_by
                  type: varchar(255)

              - column:
                  name: updated_by
                  type: varchar(255)

        # Indexes for better performance
        - createIndex:
            indexName: idx_review_hotel
            tableName: reviews
            columns:
              - column:
                  name: hotel_id

        - createIndex:
            indexName: idx_review_booking
            tableName: reviews
            columns:
              - column:
                  name: booking_id

        # Optional: Prevent multiple reviews per booking
        - addUniqueConstraint:
            tableName: reviews
            columnNames: booking_id
            constraintName: uk_review_booking