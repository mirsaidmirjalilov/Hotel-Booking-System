databaseChangeLog:
  - changeSet:
      id: create-payments-table
      author: mirsaid
      changes:
        - createTable:
            tableName: payments
            columns:
              # Columns inherited from AudiTableLong (Assumed structure)
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP

              - column:
                  name: created_by
                  type: varchar(255)

              - column:
                  name: updated_by
                  type: varchar(255)

              # Payment entity columns
              - column:
                  name: amount
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: payment_status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: paid_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: booking_id
                  type: BIGINT
                  constraints:
                    unique: true # Ensures the One-to-One nature at DB level
                    nullable: false

        # Foreign Key Constraint to the Bookings table
        - addForeignKeyConstraint:
            baseTableName: payments
            baseColumnNames: booking_id
            referencedTableName: bookings
            referencedColumnNames: id
            constraintName: fk_payments_booking
            onDelete: CASCADE